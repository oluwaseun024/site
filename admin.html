<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="theme-color" content="#0a1a3b">
    <meta name="description" content="EL-AUTOS — Premium car sales in Abuja, FCT.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Post a Car | EL-AUTOS</title>
    <link rel="preload" href="./css/all.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="./css/all.min.css"></noscript>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"></noscript>
    <style>
        .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
        *, *::after, *::before {
            box-sizing: border-box; margin: 0; padding: 0; border: 0;
            outline: 0; list-style: none; text-decoration: none;
        }
        :root {
            --navy: #0a1a3b;
            --dark: #1c1c2e;
            --gold: #c9a84c;
            --white: #ffffff;
            --light-bg: #f5f6fa;
            --text: #2d2d2d;
            --muted: #777;
            --card-border: #e0e4ef;
            --green: #27ae60;
            --red: #e74c3c;
            --transition: 0.25s ease;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body { background: var(--light-bg); color: var(--text); line-height: 1.6; }

        /* ── ADMIN HEADER ── */
        .admin-header {
            background: var(--navy);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .admin-header__logo {
            color: var(--white);
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 3px;
        }
        .admin-header__logo span { color: var(--gold); }
        .admin-header__badge {
            background: rgba(201,168,76,0.15);
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--gold);
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .admin-header__back {
            color: rgba(255,255,255,0.65);
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .admin-header__back:hover { color: var(--gold); }

        /* ── LAYOUT ── */
        .admin-body {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            align-items: start;
        }

        /* ── FORM PANEL ── */
        .form-panel {
            background: var(--white);
            border: 1.5px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
        }
        .form-panel__header {
            background: var(--navy);
            color: var(--white);
            padding: 1rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .form-panel__body { padding: 1.5rem; }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        .form-group--full { grid-column: 1 / -1; }
        .form-group label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.6rem 0.85rem;
            border: 1.5px solid var(--card-border);
            border-radius: 8px;
            font-size: 0.88rem;
            color: var(--text);
            background: var(--light-bg);
            font-family: inherit;
            transition: var(--transition);
            width: 100%;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--navy);
            background: var(--white);
            outline: none;
        }
        .form-group textarea { resize: vertical; min-height: 80px; }

        /* Features checkboxes */
        .features-checkboxes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 0.5rem;
            margin-top: 0.3rem;
        }
        .feature-check {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.83rem;
            color: var(--text);
            cursor: pointer;
        }
        .feature-check input[type="checkbox"] {
            width: auto;
            padding: 0;
            margin: 0;
            cursor: pointer;
            accent-color: var(--navy);
        }

        /* Image Picker */
        .image-inputs { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 0.3rem; }
        .image-input-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .img-preview-thumb {
            width: 52px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            border: 1.5px solid var(--card-border);
            background: var(--light-bg);
            flex-shrink: 0;
            display: none;
        }
        .img-preview-thumb.visible { display: block; }
        .img-file-label {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 0.85rem;
            border: 1.5px solid var(--card-border);
            border-radius: 8px;
            background: var(--light-bg);
            cursor: pointer;
            font-size: 0.83rem;
            color: var(--muted);
            font-weight: 600;
            transition: var(--transition);
            overflow: hidden;
            white-space: nowrap;
        }
        .img-file-label:hover { border-color: var(--navy); color: var(--navy); background: var(--white); }
        .img-file-label i { flex-shrink: 0; }
        .img-file-label span { overflow: hidden; text-overflow: ellipsis; }
        .img-file-input { display: none; }
        .img-remove-btn {
            background: var(--light-bg);
            border: 1.5px solid var(--card-border);
            border-radius: 6px;
            padding: 0.5rem 0.7rem;
            cursor: pointer;
            color: var(--red);
            transition: var(--transition);
            flex-shrink: 0;
        }
        .img-remove-btn:hover { background: var(--red); color: var(--white); border-color: var(--red); }
        .add-img-btn {
            background: transparent;
            border: 1.5px dashed var(--card-border);
            border-radius: 8px;
            padding: 0.5rem;
            width: 100%;
            cursor: pointer;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 600;
            margin-top: 0.3rem;
            transition: var(--transition);
        }
        .add-img-btn:hover { border-color: var(--navy); color: var(--navy); }

        /* Submit / Actions */
        .form-actions {
            display: flex;
            gap: 0.8rem;
            margin-top: 1.5rem;
        }
        .btn-publish {
            flex: 1;
            padding: 0.85rem;
            background: var(--navy);
            color: var(--white);
            font-weight: 800;
            font-size: 0.9rem;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 2px solid var(--navy);
        }
        .btn-publish:hover { background: var(--gold); color: var(--navy); border-color: var(--gold); }
        .btn-clear {
            padding: 0.85rem 1.2rem;
            background: transparent;
            color: var(--muted);
            font-weight: 700;
            font-size: 0.88rem;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid var(--card-border);
            transition: var(--transition);
        }
        .btn-clear:hover { border-color: var(--red); color: var(--red); }

        /* ── LISTINGS PANEL ── */
        .listings-panel {
            background: var(--white);
            border: 1.5px solid var(--card-border);
            border-radius: 14px;
            overflow: hidden;
            position: sticky;
            top: 1rem;
        }
        .listings-panel__header {
            background: var(--dark);
            color: var(--white);
            padding: 1rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .listings-panel__count {
            background: var(--gold);
            color: var(--navy);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.78rem;
            font-weight: 800;
        }
        .listings-panel__body {
            max-height: 600px;
            overflow-y: auto;
        }
        .admin-car-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.9rem 1.2rem;
            border-bottom: 1px solid var(--card-border);
            transition: var(--transition);
        }
        .admin-car-row:last-child { border-bottom: none; }
        .admin-car-row:hover { background: var(--light-bg); }
        .admin-car-row img {
            width: 60px;
            height: 44px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
            background: var(--light-bg);
        }
        .admin-car-row__info { flex: 1; min-width: 0; }
        .admin-car-row__name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .admin-car-row__price {
            font-size: 0.78rem;
            color: var(--muted);
        }
        .admin-car-row__actions {
            display: flex;
            gap: 0.3rem;
            flex-shrink: 0;
        }
        .row-btn {
            width: 30px; height: 30px;
            border-radius: 6px;
            border: 1.5px solid var(--card-border);
            background: transparent;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            transition: var(--transition);
        }
        .row-btn--edit { color: var(--navy); }
        .row-btn--edit:hover { background: var(--navy); color: var(--white); border-color: var(--navy); }
        .row-btn--delete { color: var(--red); }
        .row-btn--delete:hover { background: var(--red); color: var(--white); border-color: var(--red); }

        .no-listings {
            padding: 2.5rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.88rem;
        }
        .no-listings i { font-size: 2rem; color: var(--card-border); display: block; margin-bottom: 0.5rem; }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 1.5rem; left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--green);
            color: var(--white);
            padding: 0.7rem 1.6rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 9999;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── LOGIN GATE ── */
        .login-gate {
            position: fixed; inset: 0;
            background: var(--navy);
            display: flex; align-items: center; justify-content: center;
            z-index: 99999;
            padding: 1.5rem;
        }
        .login-gate.hidden { display: none; }
        .login-box {
            background: var(--white);
            border-radius: 18px;
            width: 100%; max-width: 400px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(0,0,0,0.45);
        }
        .login-box__header {
            background: var(--navy);
            padding: 1.6rem 2rem 1.4rem;
            text-align: center;
        }
        .login-box__logo {
            font-size: 1.5rem; font-weight: 900;
            letter-spacing: 3px; color: var(--white);
        }
        .login-box__logo span { color: var(--gold); }
        .login-box__subtitle {
            color: rgba(255,255,255,0.5);
            font-size: 0.78rem; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            margin-top: 0.3rem;
        }
        .login-box__body { padding: 2rem; }
        .login-box__title {
            font-size: 1rem; font-weight: 800;
            color: var(--dark); margin-bottom: 1.4rem;
            text-align: center;
        }
        .login-field {
            display: flex; flex-direction: column;
            gap: 0.35rem; margin-bottom: 1rem;
        }
        .login-field label {
            font-size: 0.72rem; font-weight: 700;
            color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .login-field input {
            padding: 0.65rem 0.9rem;
            border: 1.5px solid var(--card-border);
            border-radius: 8px; font-size: 0.9rem;
            color: var(--text); background: var(--light-bg);
            font-family: inherit; transition: var(--transition); width: 100%;
        }
        .login-field input:focus {
            border-color: var(--navy); background: var(--white); outline: none;
        }
        .login-field input.input-error { border-color: var(--red); }
        .login-error {
            color: var(--red); font-size: 0.8rem; font-weight: 600;
            text-align: center; margin-bottom: 0.8rem;
            min-height: 1.2em;
        }
        .btn-login {
            width: 100%; padding: 0.85rem;
            background: var(--navy); color: var(--white);
            font-weight: 800; font-size: 0.92rem;
            border-radius: 10px; cursor: pointer;
            border: 2px solid var(--navy); transition: var(--transition);
        }
        .btn-login:hover { background: var(--gold); color: var(--navy); border-color: var(--gold); }
        .login-box__footer {
            text-align: center; padding: 0 2rem 1.5rem;
            font-size: 0.75rem; color: var(--muted);
        }
        /* Logout button in header */
        .btn-logout {
            color: rgba(255,255,255,0.6);
            font-size: 0.82rem; font-weight: 600;
            cursor: pointer; background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px; padding: 4px 10px;
            transition: var(--transition);
        }
        .btn-logout:hover { color: var(--gold); border-color: var(--gold); }
        /* Change credentials link */
        .change-creds-link {
            color: var(--gold); font-size: 0.78rem;
            font-weight: 600; cursor: pointer;
            text-decoration: underline; background: none;
            border: none; padding: 0;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .admin-body { grid-template-columns: 1fr; }
            .listings-panel { position: static; }
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-group--full { grid-column: 1; }
            .admin-body { padding: 1rem; }
        }
    </style>
</head>
<body>

    <!-- ══ LOGIN GATE ══ -->
    <div class="login-gate" id="loginGate">
        <div class="login-box">
            <div class="login-box__header">
                <div class="login-box__logo">EL-<span>AUTOS</span></div>
                <div class="login-box__subtitle">Admin Panel</div>
            </div>
            <div class="login-box__body">
                <div class="login-box__title" id="loginTitle">Sign In</div>
                <div class="login-error" id="loginError"></div>

                <!-- USERNAME -->
                <div class="login-field">
                    <label>Username</label>
                    <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username">
                </div>
                <!-- PASSWORD -->
                <div class="login-field">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password"
                           onkeydown="if(event.key==='Enter') submitLogin()">
                </div>
                <!-- CONFIRM PASSWORD (setup only) -->
                <div class="login-field" id="confirmField" style="display:none;">
                    <label>Confirm Password</label>
                    <input type="password" id="loginPassConfirm" placeholder="Repeat password"
                           onkeydown="if(event.key==='Enter') submitLogin()">
                </div>

                <button class="btn-login" onclick="submitLogin()" id="loginBtn">Sign In</button>
            </div>
            <div class="login-box__footer" id="loginFooter">
                Secured admin access · EL-AUTOS Abuja
            </div>
        </div>
    </div>

    <!-- ADMIN HEADER -->
    <div class="admin-header">
        <div style="display:flex;align-items:center;gap:1rem;">
            <span class="admin-header__logo">EL-<span>AUTOS</span></span>
            <span class="admin-header__badge">Admin Panel</span>
        </div>
        <a href="./" class="admin-header__back"><i class="fa fa-arrow-left"></i> Back to Website</a>
        <button class="btn-logout" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</button>
    </div>

    <div class="admin-body">

        <!-- ── CAR FORM ── -->
        <div class="form-panel">
            <div class="form-panel__header">
                <i class="fa fa-plus-circle"></i>
                <span id="formTitle">Post a New Car</span>
            </div>
            <div class="form-panel__body">
                <input type="hidden" id="editId">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Make *</label>
                        <select id="fMake" onchange="updateModelOptions()">
                            <option value="">Select Make</option>
                            <option value="Toyota">Toyota</option>
                            <option value="Mercedes-Benz">Mercedes-Benz</option>
                            <option value="BMW">BMW</option>
                            <option value="Lexus">Lexus</option>
                            <option value="Porsche">Porsche</option>
                            <option value="Honda">Honda</option>
                            <option value="Audi">Audi</option>
                            <option value="Ford">Ford</option>
                            <option value="Hyundai">Hyundai</option>
                            <option value="Kia">Kia</option>
                            <option value="Jeep">Jeep</option>
                            <option value="Land Rover">Land Rover</option>
                            <option value="Chevrolet">Chevrolet</option>
                            <option value="Mitsubishi">Mitsubishi</option>
                            <option value="Nissan">Nissan</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Model *</label>
                        <input type="text" id="fModel" placeholder="e.g. Land Cruiser">
                    </div>

                    <div class="form-group">
                        <label>Year *</label>
                        <select id="fYear">
                            <option value="">Select Year</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Condition *</label>
                        <select id="fCondition">
                            <option value="">Select</option>
                            <option value="Used">Used</option>
                            <option value="New">New</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Body Type *</label>
                        <select id="fBody">
                            <option value="">Select</option>
                            <option value="SUV">SUV</option>
                            <option value="Sedan">Sedan</option>
                            <option value="Coupe">Coupe</option>
                            <option value="Pickup">Pickup</option>
                            <option value="Hatchback">Hatchback</option>
                            <option value="Convertible">Convertible</option>
                            <option value="Minivan">Minivan</option>
                            <option value="Truck">Truck</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Price (₦) *</label>
                        <input type="number" id="fPrice" placeholder="e.g. 45000000">
                    </div>

                    <div class="form-group">
                        <label>Engine</label>
                        <input type="text" id="fEngine" placeholder="e.g. 3.5L V6">
                    </div>

                    <div class="form-group">
                        <label>Transmission</label>
                        <select id="fTransmission">
                            <option value="Automatic">Automatic</option>
                            <option value="Manual">Manual</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Fuel Type</label>
                        <select id="fFuel">
                            <option value="Gasoline">Gasoline</option>
                            <option value="Diesel">Diesel</option>
                            <option value="Hybrid">Hybrid</option>
                            <option value="Electric">Electric</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Drive</label>
                        <select id="fDrive">
                            <option value="AWD">AWD</option>
                            <option value="4WD">4WD</option>
                            <option value="FWD">FWD</option>
                            <option value="RWD">RWD</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Mileage</label>
                        <input type="text" id="fMileage" placeholder="e.g. 45,000 km">
                    </div>

                    <div class="form-group">
                        <label>Fuel Consumption</label>
                        <input type="text" id="fFuelConsumption" placeholder="e.g. 18/24 mpg">
                    </div>

                    <div class="form-group">
                        <label>Exterior Color</label>
                        <input type="text" id="fExtColor" placeholder="e.g. Pearl White">
                    </div>

                    <div class="form-group">
                        <label>Interior Color</label>
                        <input type="text" id="fIntColor" placeholder="e.g. Black Leather">
                    </div>

                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="fLocation" value="Abuja" placeholder="e.g. Abuja">
                    </div>

                    <div class="form-group">
                        <label>Stock Number</label>
                        <input type="text" id="fStock" placeholder="e.g. Stock# 120">
                    </div>

                    <div class="form-group form-group--full">
                        <label>Description</label>
                        <textarea id="fDescription" placeholder="Describe the vehicle — its history, condition, highlights..."></textarea>
                    </div>

                    <!-- Image Picker -->
                    <div class="form-group form-group--full">
                        <label>Car Images</label>
                        <div class="image-inputs" id="imageInputs">
                            <!-- rows injected by JS on init -->
                        </div>
                        <button class="add-img-btn" onclick="addImgRow()"><i class="fa fa-plus"></i> Add Another Image</button>
                    </div>

                    <!-- Features -->
                    <div class="form-group form-group--full">
                        <label>Key Features</label>
                        <div class="features-checkboxes">
                            <label class="feature-check"><input type="checkbox" value="Leather Seats"> Leather Seats</label>
                            <label class="feature-check"><input type="checkbox" value="Sunroof"> Sunroof</label>
                            <label class="feature-check"><input type="checkbox" value="4WD"> 4WD</label>
                            <label class="feature-check"><input type="checkbox" value="Rear Camera"> Rear Camera</label>
                            <label class="feature-check"><input type="checkbox" value="360 Camera"> 360 Camera</label>
                            <label class="feature-check"><input type="checkbox" value="Cruise Control"> Cruise Control</label>
                            <label class="feature-check"><input type="checkbox" value="Climate Control"> Climate Control</label>
                            <label class="feature-check"><input type="checkbox" value="Push Start"> Push Start</label>
                            <label class="feature-check"><input type="checkbox" value="Alloy Wheels"> Alloy Wheels</label>
                            <label class="feature-check"><input type="checkbox" value="Heated Seats"> Heated Seats</label>
                            <label class="feature-check"><input type="checkbox" value="Keyless Entry"> Keyless Entry</label>
                            <label class="feature-check"><input type="checkbox" value="Parking Sensors"> Parking Sensors</label>
                            <label class="feature-check"><input type="checkbox" value="Navigation"> Navigation</label>
                            <label class="feature-check"><input type="checkbox" value="Apple CarPlay"> Apple CarPlay</label>
                            <label class="feature-check"><input type="checkbox" value="Premium Audio"> Premium Audio</label>
                            <label class="feature-check"><input type="checkbox" value="Blind Spot Monitor"> Blind Spot Monitor</label>

                    </div>

                </div><!-- end form-grid -->

                <div class="form-actions">
                    <button class="btn-publish" onclick="publishCar()">
                        <i class="fa fa-check-circle"></i>
                        <span id="publishBtnText">Publish Car</span>
                    </button>
                    <button class="btn-clear" onclick="clearForm()">Clear</button>
                </div>

            </div>
        </div>

        <!-- ── CURRENT LISTINGS ── -->
        <div class="listings-panel">
            <div class="listings-panel__header">
                <span><i class="fa fa-list"></i> Current Listings</span>
                <div style="display:flex;align-items:center;gap:0.6rem;">
                    <button class="change-creds-link" onclick="showChangeCreds()" title="Change login credentials">
                        <i class="fa fa-key"></i>
                    </button>
                    <span class="listings-panel__count" id="listingCount">0</span>
                </div>
            </div>
            <div class="listings-panel__body" id="adminListings">
                <div class="no-listings" id="noListings">
                    <i class="fa fa-car"></i>
                    No cars published yet
                </div>
            </div>
        </div>

    </div><!-- end admin-body -->

    <div class="toast" id="toast"></div>

    <script>
    /* =================================================================
       YEAR DROPDOWN: 2000 – 2025 ascending
    ================================================================= */
    const yearSel = document.getElementById('fYear');
    for (let y = 2000; y <= 2026; y++) {
        const opt = document.createElement('option');
        opt.value = y;
        opt.textContent = y;
        yearSel.appendChild(opt);
    }

    /* =================================================================
       LOCAL STORAGE KEY
       The admin panel reads and writes the same key that inventory.html
       uses (elautos_cars), so any car published here shows up on the
       live site immediately — no server needed.
    ================================================================= */
    const LS_KEY = 'elautos_cars';

    function loadCars() {
        try {
            const data = JSON.parse(localStorage.getItem(LS_KEY));
            if (Array.isArray(data)) return data;
        } catch (e) {}

        /* Seed with the default cars if nothing is stored yet */
        const defaultCars = [
            {
                id: 1, name: "Toyota Land Cruiser", make: "Toyota", model: "Land Cruiser",
                year: 2009, condition: "Used", body: "SUV", price: 61500000,
                priceLabel: "₦61,500,000", fuelType: "Gasoline", engine: "5.7L V8",
                transmission: "Automatic", drive: "4WD", mileage: "98,000 km",
                fuelConsumption: "13/18 mpg", exteriorColor: "Pearl White",
                interiorColor: "Beige Leather", location: "Abuja", stock: "Stock# 118",
                description: "A powerful full-size SUV with legendary off-road capability.",
                images: ["./images/RDT_20260127_1809521317004081621988621.jpg"],
                features: ["Leather Seats", "Sunroof", "4WD", "Rear Camera"]
            },
            {
                id: 2, name: "Mercedes-Benz C43 AMG", make: "Mercedes-Benz", model: "C43 AMG",
                year: 2020, condition: "Used", body: "Sedan", price: 67000000,
                priceLabel: "₦67,000,000", fuelType: "Gasoline", engine: "3.0L V6 Twin-Turbo",
                transmission: "Automatic", drive: "AWD", mileage: "32,000 km",
                fuelConsumption: "20/27 mpg", exteriorColor: "Obsidian Black",
                interiorColor: "Black AMG Sport", location: "Abuja", stock: "Stock# 117",
                description: "The C43 AMG blends everyday practicality with sports car performance.",
                images: ["./images/RDT_20260127_1809447195146435998933724.jpg"],
                features: ["AMG Sport Package", "Heated Seats", "Panoramic Roof"]
            },
            {
                id: 3, name: "Lexus IS250", make: "Lexus", model: "IS250",
                year: 2015, condition: "Used", body: "Sedan", price: 37000000,
                priceLabel: "₦37,000,000", fuelType: "Gasoline", engine: "2.5L V6",
                transmission: "Automatic", drive: "RWD", mileage: "55,000 km",
                fuelConsumption: "21/30 mpg", exteriorColor: "Starfire Pearl",
                interiorColor: "Black Semi-Aniline", location: "Abuja", stock: "Stock# 116",
                description: "Lexus reliability meets luxury design.",
                images: ["./images/RDT_20260127_1811496403388373556527195.jpg"],
                features: ["Leather Seats", "Sunroof", "Rear Camera"]
            }
        ];
        saveCars(defaultCars);
        return defaultCars;
    }

    function saveCars(cars) {
        try {
            localStorage.setItem(LS_KEY, JSON.stringify(cars));
            return true;
        } catch (e) {
            // localStorage quota exceeded — likely too many/large images
            showToast('Storage full! Try fewer or smaller images.', 'error');
            return false;
        }
    }

    /* =================================================================
       FORMAT PRICE LABEL
    ================================================================= */
    function formatPrice(num) {
        return '₦' + Number(num).toLocaleString('en-NG');
    }

    /* =================================================================
       GENERATE NEXT ID
    ================================================================= */
    function nextId(cars) {
        return cars.length > 0 ? Math.max(...cars.map(c => c.id)) + 1 : 1;
    }

    /* =================================================================
       IMAGE ROWS — file picker with base64 preview
    ================================================================= */
    function buildImgRow(base64 = '') {
        const row = document.createElement('div');
        row.className = 'image-input-row';
        row.innerHTML = `
            <img loading="lazy" decoding="async" class="img-preview-thumb${base64 ? ' visible' : ''}" src="${base64}" alt="preview">
            <label class="img-file-label">
                <i class="fa fa-image"></i>
                <span class="img-file-name">${base64 ? 'Image selected' : 'Choose image from device\u2026'}</span>
                <input type="file" class="img-file-input" accept="image/*" onchange="handleFileSelect(this)">
            </label>
            <button class="img-remove-btn" onclick="removeImgRow(this)" title="Remove"><i class="fa fa-times"></i></button>`;
        /* store base64 on the row so getImages() can read it */
        row.dataset.imgSrc = base64;
        return row;
    }

    function addImgRow(base64 = '') {
        document.getElementById('imageInputs').appendChild(buildImgRow(base64));
    }

    function handleFileSelect(input) {
        const file = input.files[0];
        if (!file) return;

        // Show loading state
        const row = input.closest('.image-input-row');
        row.querySelector('.img-file-name').textContent = 'Processing…';

        const reader = new FileReader();
        reader.onload = function(e) {
            // Compress image using canvas before storing
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                // Max 1200px wide, keep aspect ratio
                const MAX_W = 1200;
                const scale = img.width > MAX_W ? MAX_W / img.width : 1;
                canvas.width  = Math.round(img.width  * scale);
                canvas.height = Math.round(img.height * scale);
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                // JPEG at 75% quality — good balance of size vs clarity
                const compressed = canvas.toDataURL('image/jpeg', 0.75);

                row.dataset.imgSrc = compressed;
                const thumb = row.querySelector('.img-preview-thumb');
                thumb.src = compressed;
                thumb.classList.add('visible');
                row.querySelector('.img-file-name').textContent = file.name;
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function removeImgRow(btn) {
        const inputs = document.querySelectorAll('#imageInputs .image-input-row');
        if (inputs.length <= 1) return; // keep at least one
        btn.closest('.image-input-row').remove();
    }

    function getImages() {
        return [...document.querySelectorAll('#imageInputs .image-input-row')]
            .map(row => row.dataset.imgSrc || '')
            .filter(Boolean);
    }

    /* =================================================================
       PUBLISH / UPDATE CAR
    ================================================================= */
    function publishCar() {
        const make  = document.getElementById('fMake').value.trim();
        const model = document.getElementById('fModel').value.trim();
        const year  = parseInt(document.getElementById('fYear').value);
        const cond  = document.getElementById('fCondition').value;
        const body  = document.getElementById('fBody').value;
        const price = parseInt(document.getElementById('fPrice').value);

        // Basic validation
        if (!make || !model || !year || !cond || !body || !price) {
            showToast('Please fill in all required fields (*)', 'error');
            return;
        }

        const features = [...document.querySelectorAll('.feature-check input:checked')]
            .map(cb => cb.value);

        const images = getImages();
        if (images.length === 0) images.push('https://placehold.co/600x400/0a1a3b/c9a84c?text=EL-AUTOS');

        const cars = loadCars();
        const editId = document.getElementById('editId').value;

        const carData = {
            id: editId ? parseInt(editId) : nextId(cars),
            name: `${make} ${model}`,
            make, model, year, condition: cond,
            body, price,
            priceLabel: formatPrice(price),
            fuelType: document.getElementById('fFuel').value,
            engine: document.getElementById('fEngine').value || '—',
            transmission: document.getElementById('fTransmission').value,
            drive: document.getElementById('fDrive').value,
            mileage: document.getElementById('fMileage').value || '—',
            fuelConsumption: document.getElementById('fFuelConsumption').value || '—',
            exteriorColor: document.getElementById('fExtColor').value || '—',
            interiorColor: document.getElementById('fIntColor').value || '—',
            location: document.getElementById('fLocation').value || 'Abuja',
            stock: document.getElementById('fStock').value || `Stock# ${nextId(cars)}`,
            description: document.getElementById('fDescription').value || '',
            images, features
        };

        if (editId) {
            // Update existing
            const idx = cars.findIndex(c => c.id === parseInt(editId));
            if (idx !== -1) cars[idx] = carData;
            showToast('Car updated successfully!');
        } else {
            // Add new
            cars.push(carData);
            showToast('Car published successfully!');
        }

        const saved = saveCars(cars);
        if (!saved) return; // storage failed — toast already shown, keep form intact
        clearForm();
        renderListings();
    }

    /* =================================================================
       EDIT CAR
    ================================================================= */
    function editCar(id) {
        const cars = loadCars();
        const car = cars.find(c => c.id === id);
        if (!car) return;

        document.getElementById('editId').value = car.id;
        document.getElementById('fMake').value = car.make;
        document.getElementById('fModel').value = car.model;
        document.getElementById('fYear').value = car.year;
        document.getElementById('fCondition').value = car.condition;
        document.getElementById('fBody').value = car.body;
        document.getElementById('fPrice').value = car.price;
        document.getElementById('fEngine').value = car.engine;
        document.getElementById('fTransmission').value = car.transmission;
        document.getElementById('fFuel').value = car.fuelType;
        document.getElementById('fDrive').value = car.drive;
        document.getElementById('fMileage').value = car.mileage;
        document.getElementById('fFuelConsumption').value = car.fuelConsumption;
        document.getElementById('fExtColor').value = car.exteriorColor;
        document.getElementById('fIntColor').value = car.interiorColor;
        document.getElementById('fLocation').value = car.location;
        document.getElementById('fStock').value = car.stock;
        document.getElementById('fDescription').value = car.description;

        // Images
        const imgContainer = document.getElementById('imageInputs');
        imgContainer.innerHTML = '';
        (car.images && car.images.length ? car.images : ['']).forEach(src => {
            imgContainer.appendChild(buildImgRow(src));
        });

        // Features
        document.querySelectorAll('.feature-check input').forEach(cb => {
            cb.checked = car.features.includes(cb.value);
        });

        document.getElementById('formTitle').textContent = 'Edit Car Listing';
        document.getElementById('publishBtnText').textContent = 'Save Changes';

        // Scroll to form
        document.querySelector('.form-panel').scrollIntoView({ behavior: 'smooth' });
    }

    /* =================================================================
       DELETE CAR
    ================================================================= */
    function deleteCar(id) {
        if (!confirm('Delete this car listing?')) return;
        const cars = loadCars().filter(c => c.id !== id);
        saveCars(cars);
        renderListings();
        showToast('Car removed from listings.', 'error');
    }

    /* =================================================================
       CLEAR FORM
    ================================================================= */
    function clearForm() {
        document.getElementById('editId').value = '';
        ['fMake','fModel','fYear','fCondition','fBody','fPrice','fEngine',
         'fMileage','fFuelConsumption','fExtColor','fIntColor','fStock','fDescription']
            .forEach(id => { document.getElementById(id).value = ''; });
        document.getElementById('fTransmission').value = 'Automatic';
        document.getElementById('fFuel').value = 'Gasoline';
        document.getElementById('fDrive').value = 'AWD';
        document.getElementById('fLocation').value = 'Abuja';

        // Reset images to one empty picker row
        const imgContainer = document.getElementById('imageInputs');
        imgContainer.innerHTML = '';
        imgContainer.appendChild(buildImgRow());

        // Uncheck all features
        document.querySelectorAll('.feature-check input').forEach(cb => cb.checked = false);

        document.getElementById('formTitle').textContent = 'Post a New Car';
        document.getElementById('publishBtnText').textContent = 'Publish Car';
    }

    /* =================================================================
       RENDER LISTINGS PANEL
    ================================================================= */
    function renderListings() {
        const cars = loadCars();
        const container = document.getElementById('adminListings');
        const countEl = document.getElementById('listingCount');
        countEl.textContent = cars.length;

        if (cars.length === 0) {
            container.innerHTML = `<div class="no-listings"><i class="fa fa-car"></i> No cars published yet</div>`;
            return;
        }

        container.innerHTML = cars.map(car => `
            <div class="admin-car-row">
                <img loading="lazy" decoding="async" src="${car.images[0]}" alt="${car.name}"
                     onerror="this.src='https://placehold.co/60x44/0a1a3b/c9a84c?text=CAR'">
                <div class="admin-car-row__info">
                    <div class="admin-car-row__name">${car.name} ${car.year}</div>
                    <div class="admin-car-row__price">${car.priceLabel}</div>
                </div>
                <div class="admin-car-row__actions">
                    <button class="row-btn row-btn--edit" title="Edit" onclick="editCar(${car.id})">
                        <i class="fa fa-pencil"></i>
                    </button>
                    <button class="row-btn row-btn--delete" title="Delete" onclick="deleteCar(${car.id})">
                        <i class="fa fa-trash"></i>
                    </button>
                </div>
            </div>`).join('');
    }

    /* =================================================================
       TOAST
    ================================================================= */
    function showToast(msg, type = 'success') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.style.background = type === 'error' ? '#e74c3c' : '#27ae60';
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2800);
    }

    /* =================================================================
       AUTH SYSTEM
       - First visit: prompts to set username + password
       - Credentials stored as a simple hash in localStorage
       - Session flag in sessionStorage (clears on tab close)
    ================================================================= */
    const AUTH_KEY = 'elautos_admin_creds';
    const SESSION_KEY = 'elautos_admin_session';

    /* Simple non-crypto hash — good enough for local storage protection */
    function hashStr(str) {
        let h = 5381;
        for (let i = 0; i < str.length; i++) {
            h = ((h << 5) + h) ^ str.charCodeAt(i);
            h = h >>> 0; // keep unsigned 32-bit
        }
        return h.toString(36);
    }

    function getStoredCreds() {
        try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch(e) { return null; }
    }

    function isLoggedIn() {
        return sessionStorage.getItem(SESSION_KEY) === '1';
    }

    function checkAuth() {
        const gate = document.getElementById('loginGate');
        if (isLoggedIn()) {
            gate.classList.add('hidden');
            return;
        }
        const creds = getStoredCreds();
        if (!creds) {
            // First time — setup mode
            document.getElementById('loginTitle').textContent = 'Create Admin Password';
            document.getElementById('confirmField').style.display = 'flex';
            document.getElementById('loginBtn').textContent = 'Set Password & Enter';
            document.getElementById('loginFooter').innerHTML =
                'Set a username & password to secure the admin panel.';
        } else {
            document.getElementById('loginTitle').textContent = 'Admin Sign In';
            document.getElementById('loginBtn').textContent = 'Sign In';
        }
        gate.classList.remove('hidden');
    }

    function submitLogin() {
        const userEl  = document.getElementById('loginUser');
        const passEl  = document.getElementById('loginPass');
        const confEl  = document.getElementById('loginPassConfirm');
        const errorEl = document.getElementById('loginError');
        const user    = userEl.value.trim();
        const pass    = passEl.value;
        const conf    = confEl.value;

        errorEl.textContent = '';
        [userEl, passEl, confEl].forEach(el => el.classList.remove('input-error'));

        const creds = getStoredCreds();

        if (!creds) {
            /* ── SETUP MODE ── */
            if (!user) { errorEl.textContent = 'Username cannot be empty.'; userEl.classList.add('input-error'); return; }
            if (user.length < 3) { errorEl.textContent = 'Username must be at least 3 characters.'; userEl.classList.add('input-error'); return; }
            if (pass.length < 6) { errorEl.textContent = 'Password must be at least 6 characters.'; passEl.classList.add('input-error'); return; }
            if (pass !== conf)   { errorEl.textContent = 'Passwords do not match.'; confEl.classList.add('input-error'); return; }

            localStorage.setItem(AUTH_KEY, JSON.stringify({ user: hashStr(user.toLowerCase()), pass: hashStr(pass) }));
            sessionStorage.setItem(SESSION_KEY, '1');
            document.getElementById('loginGate').classList.add('hidden');
            showToast('Credentials saved. Welcome!');
        } else {
            /* ── LOGIN MODE ── */
            if (!user || !pass) { errorEl.textContent = 'Please enter username and password.'; return; }
            if (hashStr(user.toLowerCase()) !== creds.user || hashStr(pass) !== creds.pass) {
                errorEl.textContent = 'Incorrect username or password.';
                passEl.value = '';
                passEl.classList.add('input-error');
                return;
            }
            sessionStorage.setItem(SESSION_KEY, '1');
            document.getElementById('loginGate').classList.add('hidden');
            showToast('Welcome back!');
        }
    }

    function logout() {
        sessionStorage.removeItem(SESSION_KEY);
        // Reset login form
        ['loginUser','loginPass','loginPassConfirm'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('loginError').textContent = '';
        checkAuth();
    }

    function showChangeCreds() {
        /* Reuse the login gate in "change password" mode */
        const gate    = document.getElementById('loginGate');
        const titleEl = document.getElementById('loginTitle');
        const confF   = document.getElementById('confirmField');
        const btnEl   = document.getElementById('loginBtn');
        const footer  = document.getElementById('loginFooter');

        ['loginUser','loginPass','loginPassConfirm'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('loginError').textContent = '';

        titleEl.textContent = 'Change Credentials';
        confF.style.display = 'flex';
        btnEl.textContent   = 'Update Credentials';
        footer.innerHTML    = `<button class="change-creds-link" onclick="cancelChangeCreds()">Cancel</button>`;

        /* Swap submitLogin behaviour for one-time update */
        btnEl.onclick = function() {
            const userEl  = document.getElementById('loginUser');
            const passEl  = document.getElementById('loginPass');
            const confEl  = document.getElementById('loginPassConfirm');
            const errorEl = document.getElementById('loginError');
            const user    = userEl.value.trim();
            const pass    = passEl.value;
            const conf    = confEl.value;
            errorEl.textContent = '';
            [userEl, passEl, confEl].forEach(el => el.classList.remove('input-error'));

            if (!user || user.length < 3) { errorEl.textContent = 'Username must be at least 3 characters.'; userEl.classList.add('input-error'); return; }
            if (pass.length < 6) { errorEl.textContent = 'Password must be at least 6 characters.'; passEl.classList.add('input-error'); return; }
            if (pass !== conf)   { errorEl.textContent = 'Passwords do not match.'; confEl.classList.add('input-error'); return; }

            localStorage.setItem(AUTH_KEY, JSON.stringify({ user: hashStr(user.toLowerCase()), pass: hashStr(pass) }));
            gate.classList.add('hidden');
            btnEl.onclick = submitLogin; // restore
            showToast('Credentials updated successfully!');
        };

        gate.classList.remove('hidden');
    }

    function cancelChangeCreds() {
        document.getElementById('loginGate').classList.add('hidden');
        document.getElementById('loginBtn').onclick = submitLogin;
    }

    /* Init first image row */
    document.getElementById('imageInputs').appendChild(buildImgRow());

    /* =================================================================
       INIT
    ================================================================= */
    checkAuth();
    renderListings();
    </script>
